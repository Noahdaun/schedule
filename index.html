<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스피킹짐 루틴 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F2EC;
  --cream-dark: #EAE6DC;
  --ink: #1A1A18;
  --ink-mid: #5A5A52;
  --ink-light: #9A9A8E;
  --border: rgba(26,26,24,0.12);
  --border-strong: rgba(26,26,24,0.22);
  --radius: 10px;
  --radius-lg: 14px;
  --fs: 15px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: var(--fs); line-height: 1.65; }

/* HEADER */
.header { background: var(--ink); color: var(--cream); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; gap: 10px; }
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.logo { font-size: calc(var(--fs) + 3px); font-weight: 700; white-space: nowrap; }
.logo-sub { font-size: calc(var(--fs) - 4px); color: rgba(245,242,236,.4); font-family: 'DM Mono', monospace; white-space: nowrap; }
.header-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.hbtn { display: flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 8px; border: 1px solid rgba(245,242,236,.25); background: transparent; color: var(--cream); font-size: calc(var(--fs) - 3px); font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap; transition: background .15s; }
.hbtn:hover { background: rgba(245,242,236,.12); }
.hbtn.accent { background: var(--cream); color: var(--ink); border-color: transparent; font-weight: 500; }
.hbtn.accent:hover { background: var(--cream-dark); }
.hbtn svg { flex-shrink: 0; }
/* font size control */
.fs-ctrl { display: flex; align-items: center; gap: 4px; border: 1px solid rgba(245,242,236,.25); border-radius: 8px; padding: 3px 6px; }
.fs-btn { background: transparent; border: none; color: var(--cream); cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 5px; border-radius: 5px; transition: background .15s; }
.fs-btn:hover { background: rgba(245,242,236,.15); }
.fs-val { font-size: 12px; font-family: 'DM Mono', monospace; color: rgba(245,242,236,.7); min-width: 26px; text-align: center; }

/* WRAP */
.wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }

/* SUMMARY */
.summary { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px; }
.sum-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 14px 12px; cursor: pointer; transition: all .15s; border-bottom: 3px solid transparent; }
.sum-card:hover, .sum-card.active { border-bottom-color: var(--card-color); }
.sum-period { font-size: calc(var(--fs) - 4px); color: var(--ink-light); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.sum-nums { font-size: calc(var(--fs) + 8px); font-weight: 700; line-height: 1.2; }
.sum-nums span { font-size: calc(var(--fs) - 1px); font-weight: 400; color: var(--ink-light); }
.sum-bar { height: 4px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.sum-bar-fill { height: 100%; border-radius: 99px; background: var(--card-color); transition: width .4s; }
.sum-pct { font-size: calc(var(--fs) - 3px); color: var(--ink-light); margin-top: 4px; }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 10px 22px; border: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: calc(var(--fs) - 1px); color: var(--ink-light); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { color: var(--ink); font-weight: 500; border-bottom-color: var(--ink); }

/* PAGE */
.page { display: none; }
.page.active { display: block; }

/* SECTION BAR */
.section-bar { display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
.section-label { font-size: calc(var(--fs) - 1px); font-weight: 500; white-space: nowrap; }
.section-prog { flex: 1; height: 5px; background: var(--cream-dark); border-radius: 99px; overflow: hidden; }
.section-prog-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.section-pct { font-size: calc(var(--fs) - 3px); font-family: 'DM Mono', monospace; color: var(--ink-mid); min-width: 32px; text-align: right; }
.done-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; background: #E8F5EE; color: #2A6B3E; font-size: calc(var(--fs) - 4px); font-weight: 500; white-space: nowrap; }

/* ITEM */
.item { background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.item:hover { border-color: var(--border-strong); }
.item.done { opacity: .5; }
.item.done .item-title { text-decoration: line-through; color: var(--ink-light); }
.item-main { display: flex; align-items: flex-start; gap: 12px; padding: 14px 14px; }
.cb { width: 24px; height: 24px; flex-shrink: 0; border-radius: 50%; border: 1.5px solid var(--border-strong); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .18s; margin-top: 1px; }
.cb:hover { border-color: var(--ink); background: var(--cream); }
.cb.checked { background: var(--ink); border-color: var(--ink); }
.cb svg { display: none; }
.cb.checked svg { display: block; }
.item-body { flex: 1; min-width: 0; }
.item-title { font-size: calc(var(--fs)); font-weight: 500; line-height: 1.5; }
.detail-box { display: none; margin-top: 10px; padding: 11px 13px; background: var(--cream); border-radius: 8px; border-left: 2px solid var(--border-strong); font-size: calc(var(--fs) - 2px); color: var(--ink-mid); line-height: 1.7; white-space: pre-line; }
.detail-box.open { display: block; }
.item-actions { display: flex; gap: 5px; flex-shrink: 0; padding-top: 1px; }
.ibtn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-light); transition: all .15s; }
.ibtn:hover { background: var(--cream); color: var(--ink); }
.ibtn.del:hover { border-color: #D94F3D; color: #D94F3D; background: #FEF0EE; }
.ibtn.open-detail { background: var(--cream-dark); color: var(--ink); }

/* ADD */
.add-row { display: flex; align-items: center; gap: 8px; width: 100%; padding: 12px 14px; border: 1px dashed var(--border-strong); border-radius: var(--radius); background: transparent; color: var(--ink-light); font-size: calc(var(--fs) - 1px); font-family: 'Noto Sans KR', sans-serif; cursor: pointer; margin-top: 6px; transition: all .15s; }
.add-row:hover { background: white; color: var(--ink); border-style: solid; }
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-light); font-size: calc(var(--fs) - 1px); border: 1px dashed var(--border-strong); border-radius: var(--radius); }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.38); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border-strong); padding: 22px 22px; width: min(500px,100%); max-height: 92vh; overflow-y: auto; }
.modal h3 { font-size: calc(var(--fs) + 1px); font-weight: 700; margin-bottom: 18px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: calc(var(--fs) - 3px); color: var(--ink-mid); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 5px; }
.field input, .field textarea, .field select { width: 100%; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--cream); color: var(--ink); font-size: calc(var(--fs) - 1px); font-family: 'Noto Sans KR', sans-serif; outline: none; -webkit-appearance: none; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); background: white; }
.field textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
.mfoot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn { padding: 10px 18px; border-radius: var(--radius); font-size: calc(var(--fs) - 1px); cursor: pointer; border: 1px solid var(--border-strong); background: white; color: var(--ink); font-family: 'Noto Sans KR', sans-serif; transition: all .15s; }
.btn:hover { background: var(--cream); }
.btn.pri { background: var(--ink); color: var(--cream); border-color: transparent; font-weight: 500; }
.btn.pri:hover { opacity: .85; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--ink); color: var(--cream); padding: 10px 20px; border-radius: 99px; font-size: calc(var(--fs) - 2px); opacity: 0; pointer-events: none; transition: all .22s; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width: 600px) {
  .summary { grid-template-columns: repeat(2,1fr); }
  .logo-sub { display: none; }
  .hbtn span { display: none; }
  .hbtn { padding: 7px 10px; }
  .hbtn.accent span { display: inline; }
}
@media (max-width: 400px) {
  .summary { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .wrap { padding: 14px 12px 60px; }
}

/* PRINT */
@media print {
  @page { size: A4; margin: 15mm; }
  .header, .tabs, .add-row, .item-actions, .modal-bg, .toast { display: none !important; }
  body { background: white; font-size: 11px; }
  .wrap { padding: 0; max-width: 100%; }
  .page { display: block !important; margin-bottom: 20px; page-break-after: always; }
  .page:last-of-type { page-break-after: avoid; }
  .item { page-break-inside: avoid; }
  .detail-box { display: block !important; }
  .print-title { display: block !important; font-size: 15px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--ink); }
  .summary { margin-bottom: 14px; }
}
@media screen { .print-title { display: none; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">스피킹짐</span>
    <span class="logo-sub">Speaking Gym with Noah</span>
  </div>
  <div class="header-right">
    <div class="fs-ctrl">
      <button class="fs-btn" onclick="changeFontSize(-1)" title="글자 작게">−</button>
      <span class="fs-val" id="fsVal">15</span>
      <button class="fs-btn" onclick="changeFontSize(1)" title="글자 크게">+</button>
    </div>
    <button class="hbtn" onclick="resetChecks()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7a6 6 0 1 0 .6-2.6"/><polyline points="1,2 1,7 6,7"/></svg>
      <span>초기화</span>
    </button>
    <button class="hbtn" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="10" height="7" rx="1"/><path d="M4 5V2h6v3"/><line x1="4" y1="9" x2="10" y2="9"/></svg>
      <span>프린트</span>
    </button>
    <button class="hbtn accent" onclick="openAdd(currentTab)">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
      <span>항목 추가</span>
    </button>
  </div>
</div>

<div class="wrap">
  <div class="summary" id="summary"></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('daily')">일간</button>
    <button class="tab-btn" onclick="switchTab('weekly')">주간</button>
    <button class="tab-btn" onclick="switchTab('monthly')">월간</button>
    <button class="tab-btn" onclick="switchTab('yearly')">년간</button>
  </div>
  <div id="daily" class="page active"></div>
  <div id="weekly" class="page"></div>
  <div id="monthly" class="page"></div>
  <div id="yearly" class="page"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">항목 추가</h3>
    <div class="field">
      <label>주기</label>
      <select id="fPeriod">
        <option value="daily">일간</option>
        <option value="weekly">주간</option>
        <option value="monthly">월간</option>
        <option value="yearly">년간</option>
      </select>
    </div>
    <div class="field">
      <label>제목 *</label>
      <input type="text" id="fTitle" placeholder="할 일 제목">
    </div>
    <div class="field">
      <label>상세 설명 (선택)</label>
      <textarea id="fDetail" placeholder="템플릿, 팁, 메모 등 자유롭게&#10;줄바꿈 그대로 표시됩니다"></textarea>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn pri" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PERIODS = ['daily','weekly','monthly','yearly'];
var KO = {daily:'일간',weekly:'주간',monthly:'월간',yearly:'년간'};
var COLORS = {daily:'#D94F3D',weekly:'#C98A1A',monthly:'#3A7D52',yearly:'#2E6FA3'};
var KEY = 'sg_v3';
var FS_KEY = 'sg_fs';

var DEFAULT = {
  daily:[
    {id:1,done:false,open:false,
     title:'수업 전날 밤 — 단톡 예고 메시지',
     detail:'소요: 3분 | 매일 저녁 9~10시 사이 전송\n\n📝 템플릿\n"내일 주제는 [주제]예요 💪\n[한 줄 티저 — 직장인/일상 상황에 연결]\n내일 봐요!"\n\n예시: "내일 주제는 거절을 자연스럽게 하기예요.\n직장에서 No 못 하시는 분들 내일 필수 👀"\n\n💡 주제를 직장인/취준생 상황에 연결하면 참석률 UP\n💡 이모지 1~2개 넣으면 딱딱하지 않음'},
    {id:2,done:false,open:false,
     title:'수업 당일 — 결석자 체크 & 개인 DM',
     detail:'소요: 2분 | 당일 저녁 개인 DM (단톡 X)\n\n📝 기본 템플릿\n"[이름]님 오늘 많이 바쁘셨죠?\n다음 주 오시면 오늘 핵심 표현 5분 정리해드릴게요 😊"\n\n📝 2주 연속 결석 시\n"[이름]님 요즘 많이 바쁘신 것 같아서요 👀\n몸은 괜찮으세요? 다음 주 기다릴게요!"\n\n💡 이 한 마디가 재등록율을 바꿈 — 절대 생략하지 말 것'},
    {id:3,done:false,open:false,
     title:'수업 직후 — 오늘의 한 줄 메모',
     detail:'소요: 5분 | 수업 직후 메모앱에 기록\n\n기록할 것\n- 잘 한 학생 + 표현\n- 재밌었던 순간\n- 웃긴 실수나 에피소드\n\n형식: "[이름] / [표현] / [상황]"\n\n💡 기억에 남는 게 있을 때만 해도 됨\n💡 이 메모가 주간 MVP 콘텐츠의 재료가 됨'}
  ],
  weekly:[
    {id:4,done:false,open:false,
     title:'이 주의 MVP 단톡 공유',
     detail:'소요: 10분 | 매주 금요일 or 마지막 수업 후\n\n📝 템플릿\n"이번 주 스피킹짐 MVP 💬\n[이름]님이 이 표현을 완전 자연스럽게 쓰셨어요\n→ [표현] 👏\n다들 이번 주도 수고했어요!"\n\n익명 처리 시: [이름]님 → 한 분이\n\n💡 잘 한 표현 아니어도 됨 — 용기 있게 말한 것도 MVP\n💡 칭찬 받은 학생은 다음 주도 오고 싶어짐'},
    {id:5,done:false,open:false,
     title:'다음 주 수업 주제 미리 공고',
     detail:'소요: 2분 | 금요일 or 마지막 수업일\n\n📝 템플릿\n"다음 주는 [주제] 다룰 예정이에요.\n미리 생각해오면 더 재밌어요 😎"\n\n💡 1~2문장으로 짧게 (길면 안 읽음)\n💡 직장/취준 상황에 맞는 주제일수록 참석률 UP'},
    {id:6,done:false,open:false,
     title:'출석 현황 체크 & 2주 연속 결석자 DM',
     detail:'소요: 5~8분 | 주간 마지막 수업 후\n\n2주 연속 결석자 파악 → 추가 개인 DM\n\n📝 템플릿\n"[이름]님 요즘 많이 바쁘신 것 같아서요 👀\n몸은 괜찮으세요? 다음 주 기다릴게요!"\n\n💡 이 시점에 연락 안 하면 자연 이탈로 이어짐\n💡 3주 연속 결석이면 전화 or 더 개인적인 메시지 고려'}

  monthly:[
    {id:7,done:false,open:false,
     title:'학생별 개인 피드백 DM',
     detail:'소요: 20~25분 | 매월 마지막 주\n관리받는 느낌을 가장 강하게 주는 액션\n\n📝 템플릿\n"[이름]님, 이번 달 수고하셨어요 😊\n잘 하신 점: [구체적 표현/태도 1가지]\n다음 달 집중: [딱 1가지]\n다음 달도 기대할게요 💪"\n\n💡 칭찬은 구체적으로 — "열심히 하셨어요" X\n💡 "이 표현 쓸 때 망설임이 없어졌어요" O\n💡 다음달 포인트는 딱 1개만'},

    {id:9,done:false,open:false,
     title:'이달의 표현 총정리 단톡 공유',
     detail:'소요: 10분 | 매월 마지막 주\n\n이번 달 핵심 표현 10개 정리 → 단톡 공유\n\n📝 템플릿\n"이번 달 우리가 함께 배운 표현들이에요. 저장해두세요 📌\n1. [표현] — [뜻]\n2. [표현] — [뜻]\n...(10개)"\n\n💡 SG Builder 자료에서 바로 뽑으면 시간 단축\n💡 인스타 콘텐츠로도 활용 가능'},
    {id:10,done:false,open:false,
     title:'다음달 미니 목표 설정 DM',
     detail:'소요: 5분 | 매월 마지막 주 (선택)\n\n📝 템플릿\n"다음 달 [이름]님 개인 목표 하나 정해볼까요?\n제가 수업에서 신경 써드릴게요 😊"\n\n💡 답변한 학생 = 다음 달 등록 의지 확인됨\n💡 이탈 위험 있는 학생 위주로 보내기'},
    {id:11,done:false,open:false,
     title:'출석률 & 재등록률 셀프 점검',
     detail:'소요: 10분 | 매월 1일\n\n점검 항목\n- 지난달 평균 출석률\n- 중도 이탈 학생 몇 명? 이유는?\n- 신규 문의/등록 건수\n- 참석률 높은 요일/시간대\n\n출석률 = 실제 출석 ÷ 전체 수업 × 100\n\n💡 출석률 70% 이하면 루틴 점검 필요'}
  ],
  yearly:[
    {id:12,done:false,open:false,
     title:'연간 커리큘럼 큰 그림 설계',
     detail:'소요: 2~3시간 | 매년 1월 첫째 주\n\n분기별 테마 예시\n- 1분기 (1~3월): 기초 다지기 — 자기소개, 일상 표현\n- 2분기 (4~6월): 직장 영어 — 회의, 이메일, 거절\n- 3분기 (7~9월): 취준 영어 — 면접, 자기PR\n- 4분기 (10~12월): 자유 주제 + 연말 스피킹 챌린지\n\n💡 공채 시즌 일정 반영\n💡 시즌 이슈에 맞춰 주제 배치하면 참석률 UP'},
    {id:13,done:false,open:false,
     title:'SNS 연간 콘텐츠 캘린더 작성',
     detail:'소요: 1~2시간 | 매년 1월\n\n콘텐츠 믹스 비율 (권장)\n- 교육 콘텐츠 (표현/문법): 50%\n- 수업 분위기/학생 후기: 30%\n- 원장 개인 스토리/일상: 20%\n\n월별 강조 포인트\n- 2월/8월: 새학기/시즌 개강 이벤트 홍보\n- 5~6월/11~12월: 취준 시즌 맞춤 콘텐츠\n- 12월: 연말 결산 + 다음해 목표 스토리\n\n💡 숏폼(릴스/쇼츠) 주 1~2개 꾸준히'},
    {id:14,done:false,open:false,
     title:'학생 수료 & 레벨업 이벤트',
     detail:'소요: 준비 2시간 + 당일 | 연 1~2회\n\n이벤트 아이디어\n- 수료증 제작 & 수여식\n- 1년 전 vs 지금 스피킹 비교 영상\n- 레벨 배지 제작 (초급/중급/고급)\n- 수료생 후기 인터뷰 → 인스타 콘텐츠화\n\n💡 인스타 콘텐츠로 만들면 신규 유입 효과'},
    {id:15,done:false,open:false,
     title:'수강료 & 운영 정책 연간 검토',
     detail:'소요: 1시간 | 매년 11~12월\n\n검토 항목\n- 수강료 조정 여부 (물가 + 경쟁 학원 비교)\n- 반 구성 & 정원 최적화\n- 수업 시간대 조정\n- 신규 프로그램 추가 여부 (1:1, 특강 등)\n- 마케팅 채널 효과 점검\n\n💡 연말에 미리 정해야 연초 홍보 가능\n💡 인상 시 최소 1개월 전 사전 공지'},
    {id:16,done:false,open:false,
     title:'브랜드 앰배서더 & 리퍼럴 프로그램 점검',
     detail:'소요: 1시간 | 매년 상반기/하반기\n\n체크 항목\n- 2기 앰배서더 모집 여부\n- 리퍼럴 인센티브 효과 (소개로 온 학생 몇 명?)\n- 기존 앰배서더 활동 인스타 공유\n- 후기 템플릿 업데이트\n\n인센티브 아이디어\n- 소개 1명 → 수강료 1만원 할인\n- 소개 3명 → 1회 무료 수업\n\n💡 인센티브보다 소개해달라는 말 한마디가 더 중요'}
  ]
};

var currentTab = 'daily';
var editId = null;
var nextId = 50;
var data;
var fontSize = 15;

function init() {
  fontSize = parseInt(localStorage.getItem(FS_KEY) || '15', 10);
  applyFontSize(false);
  data = loadData();
  nextId = 50;
  PERIODS.forEach(function(p) {
    data[p].forEach(function(item) { if (item.id >= nextId) nextId = item.id + 1; });
  });
  renderAll();
}

function loadData() {
  try {
    var s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}

function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
}

function changeFontSize(delta) {
  fontSize = Math.min(22, Math.max(11, fontSize + delta));
  applyFontSize(true);
}

function applyFontSize(save) {
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  var el = document.getElementById('fsVal');
  if (el) el.textContent = fontSize;
  if (save) { try { localStorage.setItem(FS_KEY, fontSize); } catch(e) {} }
}

function renderAll() {
  PERIODS.forEach(function(p) { renderPage(p); });
  renderSummary();
}

function renderSummary() {
  var html = '';
  PERIODS.forEach(function(p) {
    var items = data[p];
    var done = items.filter(function(i){return i.done;}).length;
    var pct = items.length ? Math.round(done / items.length * 100) : 0;
    var color = COLORS[p];
    var active = p === currentTab ? ' active' : '';
    html += '<div class="sum-card' + active + '" style="--card-color:' + color + '" onclick="switchTab(\'' + p + '\')">';
    html += '<div class="sum-period">' + KO[p] + '</div>';
    html += '<div class="sum-nums">' + done + '<span> / ' + items.length + '</span></div>';
    html += '<div class="sum-bar"><div class="sum-bar-fill" style="width:' + pct + '%"></div></div>';
    html += '<div class="sum-pct">' + pct + '% 완료</div>';
    html += '</div>';
  });
  document.getElementById('summary').innerHTML = html;
}

function renderPage(p) {
  var el = document.getElementById(p);
  if (!el) return;
  var items = data[p];
  var done = items.filter(function(i){return i.done;}).length;
  var pct = items.length ? Math.round(done / items.length * 100) : 0;
  var color = COLORS[p];
  var allDone = items.length > 0 && done === items.length;

  var html = '<div class="print-title">' + KO[p] + ' 루틴</div>';
  html += '<div class="section-bar">';
  html += '<span class="section-label" style="color:' + color + '">' + KO[p] + ' 루틴</span>';
  if (allDone) html += '<span class="done-badge">✓ 전체 완료</span>';
  html += '<div class="section-prog" style="margin-left:auto"><div class="section-prog-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
  html += '<span class="section-pct">' + pct + '%</span>';
  html += '</div>';

  if (items.length === 0) {
    html += '<div class="empty">항목이 없어요. 아래 버튼으로 추가하세요.</div>';
  } else {
    items.forEach(function(item) {
      html += '<div class="item' + (item.done ? ' done' : '') + '">';
      html += '<div class="item-main">';
      html += '<div class="cb' + (item.done ? ' checked' : '') + '" onclick="toggleDone(' + item.id + ')">';
      html += '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
      html += '</div>';
      html += '<div class="item-body">';
      html += '<div class="item-title">' + esc(item.title) + '</div>';
      if (item.detail) {
        html += '<div class="detail-box' + (item.open ? ' open' : '') + '">' + esc(item.detail) + '</div>';
      }
      html += '</div>';
      html += '<div class="item-actions">';
      if (item.detail) {
        html += '<button class="ibtn' + (item.open ? ' open-detail' : '') + '" onclick="toggleDetail(' + item.id + ')" title="상세">';
        html += item.open
          ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,8 6,4 10,8"/></svg>'
          : '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>';
        html += '</button>';
      }
      html += '<button class="ibtn" onclick="openEdit(' + item.id + ')" title="수정"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg></button>';
      html += '<button class="ibtn del" onclick="deleteItem(' + item.id + ')" title="삭제"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="4" x2="12" y2="4"/><path d="M5 4V2h4v2"/><path d="M3 4l1 9h6l1-9"/></svg></button>';
      html += '</div></div></div>';
    });
  }

  html += '<button class="add-row" onclick="openAdd(\'' + p + '\')">';
  html += '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg> ';
  html += KO[p] + ' 항목 추가</button>';

  el.innerHTML = html;
}

function switchTab(p) {
  currentTab = p;
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', PERIODS[i] === p);
  });
  document.querySelectorAll('.page').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById(p).classList.add('active');
  renderSummary();
}

function toggleDone(id) {
  var f = findItem(id); if (!f) return;
  f.item.done = !f.item.done;
  saveData(); renderPage(f.period); renderSummary();
  if (f.item.done) {
    var d = data[f.period];
    if (d.filter(function(i){return i.done;}).length === d.length) toast(KO[f.period] + ' 루틴 전체 완료! 🎉');
  }
}

function toggleDetail(id) {
  var f = findItem(id); if (!f) return;
  f.item.open = !f.item.open;
  saveData(); renderPage(f.period);
}

function deleteItem(id) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  var f = findItem(id); if (!f) return;
  var arr = data[f.period];
  arr.splice(arr.indexOf(f.item), 1);
  saveData(); renderPage(f.period); renderSummary(); toast('삭제됐어요');
}

function openAdd(p) {
  editId = null;
  document.getElementById('modalTitle').textContent = '항목 추가';
  document.getElementById('fPeriod').value = p;
  document.getElementById('fTitle').value = '';
  document.getElementById('fDetail').value = '';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(function(){ document.getElementById('fTitle').focus(); }, 80);
}

function openEdit(id) {
  var f = findItem(id); if (!f) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '항목 수정';
  document.getElementById('fPeriod').value = f.period;
  document.getElementById('fTitle').value = f.item.title;
  document.getElementById('fDetail').value = f.item.detail || '';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(function(){ document.getElementById('fTitle').focus(); }, 80);
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editId = null;
}

function saveItem() {
  var p = document.getElementById('fPeriod').value;
  var title = document.getElementById('fTitle').value.trim();
  var detail = document.getElementById('fDetail').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  if (editId !== null) {
    var f = findItem(editId);
    if (f) {
      var updated = {id:editId, title:title, detail:detail, done:f.item.done, open:f.item.open};
      if (f.period !== p) {
        data[f.period].splice(data[f.period].indexOf(f.item), 1);
        data[p].push(updated);
        renderPage(f.period);
      } else {
        data[f.period][data[f.period].indexOf(f.item)] = updated;
      }
      toast('수정됐어요');
    }
  } else {
    data[p].push({id:nextId++, title:title, detail:detail, done:false, open:false});
    toast('추가됐어요');
  }
  saveData(); closeModal(); switchTab(p); renderPage(p); renderSummary();
}

function resetChecks() {
  if (!confirm('모든 체크를 초기화할까요?\n(항목은 그대로 유지됩니다)')) return;
  PERIODS.forEach(function(p) { data[p].forEach(function(i){ i.done = false; }); });
  saveData(); renderAll(); toast('초기화됐어요');
}

function findItem(id) {
  for (var pi = 0; pi < PERIODS.length; pi++) {
    var p = PERIODS[pi];
    for (var ii = 0; ii < data[p].length; ii++) {
      if (data[p][ii].id === id) return {period:p, item:data[p][ii]};
    }
  }
  return null;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveItem();
});

init();
</script>
</body>
</html>
